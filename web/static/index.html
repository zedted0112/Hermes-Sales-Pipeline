<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Agent Chat</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --border: #2a2f3d;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #6c9eff;
      --user: #2d3a52;
      --bot: #1e2433;
      --ok: #5bd691;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    header p { margin: 0.25rem 0 0; color: var(--muted); font-size: 0.85rem; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .meta.ok { color: var(--ok); }
    form {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    button {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #0f1117;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing { color: var(--muted); font-style: italic; padding: 0 1rem 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>⚕ Hermes Agent App</h1>
    <p>Chat here → agent updates Report.json → Telegram watcher fires automatically</p>
  </header>
  <div id="chat"></div>
  <div id="typing" class="typing" hidden>Agent thinking…</div>
  <form id="form">
    <input id="input" type="text" placeholder="Say hi…" autocomplete="off" autofocus />
    <button type="submit" id="send">Send</button>
  </form>
  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const typing = document.getElementById("typing");

    function addMsg(text, role, meta) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = text;
      if (meta) {
        const m = document.createElement("div");
        m.className = "meta" + (meta.includes("Report") ? " ok" : "");
        m.textContent = meta;
        el.appendChild(m);
      }
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addMsg(text, "user");
      sendBtn.disabled = true;
      typing.hidden = false;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Request failed");
        let meta = "";
        if (data.report_updated) meta = "✓ Report.json updated — check Telegram in ~1 min";
        else if (data.tools_used?.length) meta = "Tools: " + data.tools_used.join(", ");
        addMsg(data.reply, "bot", meta);
      } catch (err) {
        addMsg("Error: " + err.message, "bot");
      } finally {
        sendBtn.disabled = false;
        typing.hidden = true;
        input.focus();
      }
    });

    addMsg("Hi! Type a message — I'll respond and update Report.json for the Telegram watcher.", "bot");
  </script>
</body>
</html>
